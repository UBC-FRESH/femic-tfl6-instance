publication_policy:
  tracked_in_git:
    - models/tfl6_patchworks_model_mp11_candidate/README.md
    - models/tfl6_patchworks_model_mp11_candidate/lineage_registry.yaml
    - models/tfl6_patchworks_model_mp11_candidate/analysis/base.pin
    - models/tfl6_patchworks_model_mp11_candidate/analysis/base_variant_common.bsh
    - models/tfl6_patchworks_model_mp11_candidate/analysis/headless_runtime_common.bsh
    - models/tfl6_patchworks_model_mp11_candidate/scripts/targets/flowtargets.bsh
  regenerated_by_default:
    - data/mp11_model_input_bundle/
    - output/patchworks_tfl6_mp11_candidate/
    - models/tfl6_patchworks_model_mp11_candidate/tracks/
    - models/tfl6_patchworks_model_mp11_candidate/blocks/
    - models/tfl6_patchworks_model_mp11_candidate/patchworksLog.csv
  excluded_from_publication_until_phase13:
    - models/tfl6_patchworks_model_mp11_candidate/analysis/p*/
    - models/tfl6_patchworks_model_mp11_candidate/analysis/headless_runs/
    - runtime/

caveats:
  - This is an MP11 candidate scaffold, not a final release model.
  - The Phase 5 stand universe and treatment/transition scaffold are reused.
  - P9RF source/THLB caveats remain visible until a later source-layer rebuild.
  - The 27 accepted Phase 10R Table 57 rows materialize as 18 active MP11 candidate curves.
  - Tables 54/55 remain excluded until a public-safe AU-code mapping exists.
  - Harvest-system assignment remains deferred comparison metadata.
  - Direct launch smoke, scenario smoke, release QA, and publication remain downstream work.

provenance_policy:
  - generated blocks and tracks are ignored locally until Phase 13 publication policy is decided
  - saved-stage smoke outputs are ignored locally and recorded through run manifests and notes
  - update this registry whenever runtime-package inputs, commands, or launch surfaces change
