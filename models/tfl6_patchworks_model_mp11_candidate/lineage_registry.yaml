      - models/tfl6_patchworks_model_mp11_candidate/analysis/base_variant_common.bsh
      - models/tfl6_patchworks_model_mp11_candidate/analysis/headless_runtime_common.bsh
      - models/tfl6_patchworks_model_mp11_candidate/scripts/targets/flowtargets.bsh
    qa_status: candidate_p12_3_ready_for_p12_4_launch_smoke
  direct_launch_smoke:
    run_id: tfl6_mp11_candidate_p12_4_launch0
    command: >
      python -m femic patchworks run-headless
      models/tfl6_patchworks_model_mp11_candidate/analysis/base.pin
      --instance-root external/femic-tfl6-instance
      --config config/patchworks.runtime.mp11_candidate.windows.yaml
      --run-id tfl6_mp11_candidate_p12_4_launch0
      --iterations 0
      --stage-label p12_4_launch0
    qa_status: candidate_p12_4
    owner: P12.4
    evidence:
      planning_note: planning/tfl6_mp11_direct_launch_qa.md
      raw_returncode: 0
      returncode: 0
      terminal_state: success
      detected_marker: "[FEMIC headless] saveStage completed"
      saved_file_count: 3359
      stage_dir: models/tfl6_patchworks_model_mp11_candidate/analysis/p12_4_launch0
      scenario_mode: none
