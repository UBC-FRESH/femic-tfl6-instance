pre_commercial_thinning:
  enabled: false
  state_field: "SILV_STATE"
  from_state: "cc_pl"
  to_state: "cc_pl_pct"
  eligible_au_ids: []
  min_origin: "planted"
  age_by_au: {}
  remove_species:
    - "HW"

commercial_thinning:
  enabled: false
  state_field: "SILV_STATE"
  from_state: "cc_pl"
  to_state: "cc_pl_ct"
  eligible_au_ids: []
  min_origin: "planted"
  age_by_au: {}
  basal_area_removal_fraction: 0.30
  basal_area_to_volume_ratio: 1.0

fertilization:
  enabled: false
  state_field: "SILV_STATE"
  response_years: 10
  growth_speedup_fraction: 0.10
  first_application:
    from_state: "cc_pl_ct"
    to_state: "cc_pl_ct_f1"
    timing_rule: "cai_argmax"
  second_application:
    enabled: true
    from_state: "cc_pl_ct_f1"
    to_state: "cc_pl_ct_f1_f2"
    years_after_previous: 10
  third_application:
    enabled: true
    from_state: "cc_pl_ct_f1_f2"
    to_state: "cc_pl_ct_f1_f2_f3"
    years_after_previous: 10

qmd:
  enabled: false
  source: "synthetic"
  notes: "Replace provisional QMD curves with observed or Nemora-derived curves when available."

retention:
  full_retention_au_ids: []
  full_retention_stratum_codes: []
