metadata:
  instance: "tfl6"
  phase: "P3.5"
  status: "planning_contract"
  planning_note: "planning/tfl6_treatment_option_contract.md"
  notes:
    - "This file records the reviewed TFL 6 treatment vocabulary for P3.5."
    - "P3.6 owns transition logic; Phase 4 owns Patchworks-facing table/XML generation."
    - "managed/unmanaged treatment eligibility remains separate from natural/treated curve provenance."

treatment_catalogue:
  grow:
    label: "Grow/no scheduled treatment"
    status: "accepted_implicit_state_behavior"
    scheduled_action: false
    role: "Stand remains unscheduled in the period."
  clearcut_and_plant:
    label: "Clearcut and plant"
    status: "accepted_base_scheduled_treatment"
    scheduled_action: true
    role: "Primary timber-harvest treatment for eligible managed THLB stands, including planted regeneration as the base post-harvest path."
    eligibility_filters:
      - "inside_tfl6_aoi"
      - "thlb"
      - "managed_treatment_eligible"
      - "not_full_retention_or_reserve"
      - "operable_under_scenario"
      - "valid_static_au"
      - "valid_yield_curve"
      - "minimum_harvest_age_or_merchantability_rule"
    post_harvest_transition_target: "planted_regeneration"
  commercial_thinning:
    label: "Commercial thinning"
    status: "accepted_group_gated_scenario_treatment"
    scheduled_action: true
    eligible_groups:
      - "nicf_k3z_core"
      - "nicf_expansion_candidate"
    role: "NICF-focused scenario treatment; unavailable in the WFP/TFL 6 remainder unless explicitly broadened later."
    blockers_before_activation:
      - "merchantability_thresholds"
      - "removal_fractions"
      - "residual_state_transitions"
      - "products_and_accounts"
  fertilization:
    label: "Fertilization"
    status: "accepted_group_gated_scenario_treatment"
    scheduled_action: true
    eligible_groups:
      - "nicf_k3z_core"
      - "nicf_expansion_candidate"
    role: "NICF-focused scenario treatment; unavailable in the WFP/TFL 6 remainder unless explicitly broadened later."
    blockers_before_activation:
      - "separate_embedded_tipsy_yield_assumptions_from_scheduled_fertilization"
      - "response_curve_rules"
      - "products_and_accounts"

reporting_hooks:
  groups:
    - "tfl6"
    - "thlb"
    - "non_thlb"
    - "managed_treatment_eligible"
    - "unmanaged"
    - "natural_curve_provenance"
    - "treated_curve_provenance"
    - "nicf_k3z_core"
    - "nicf_expansion_candidate"
    - "wfp_tfl6_remainder"
    - "cedar_signal"
    - "operability_or_slope_proxy"
  products:
    - "total_merchantable_volume"
    - "species_or_species_group_volume_where_supported"
    - "cedar_reporting_hooks_after_p3_1_review"
    - "harvested_area"

deferred_treatments:
  pre_commercial_thinning:
    status: "deferred"
    blocker: "Needs reviewed stocking/age eligibility, response logic, and teaching purpose."
  commercial_thinning:
    status: "group_gated"
    eligible_groups:
      - "nicf_k3z_core"
      - "nicf_expansion_candidate"
    blocker: "Needs merchantability thresholds, removal fractions, residual-state transitions, and products before activation."
  fertilization:
    status: "group_gated"
    eligible_groups:
      - "nicf_k3z_core"
      - "nicf_expansion_candidate"
    blocker: "Needs separation between TIPSY yield assumptions already embedded in curves and optional scheduled fertilization scenarios before activation."
  cedar_specific_treatments:
    status: "deferred"
    blocker: "Belongs to P3.1 cedar signal/product/treatment design."
  nicf_expansion_actions:
    status: "deferred"
    blocker: "Belongs to P3.2 embedded identity and later scenario design."

# Legacy FEMIC Patchworks silviculture knobs remain disabled until a later
# implementation lane explicitly maps them to accepted TFL 6 treatment states.
pre_commercial_thinning:
  enabled: false

commercial_thinning:
  enabled: false

fertilization:
  enabled: false

qmd:
  enabled: false

retention:
  full_retention_au_ids: []
  full_retention_stratum_codes: []
